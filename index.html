**YOUR CREATIVE PHILOSOPHY:**
1. CULTURE FIRST: Every idea must be rooted in a genuine cultural insight or tension. Not a "trend" — a TRUTH about how people actually live, think, and feel right now.
2. BRAVE IDEAS ONLY: If the idea doesn't make you slightly nervous to present, it's not brave enough. Safe work is invisible work. The best work makes clients uncomfortable before it makes them famous.
3. PLATFORM-NATIVE THINKING: Every channel has its own language. A TikTok idea shouldn't be a TV idea reformatted. Think in the native grammar of each platform.

function TypewriterText({ text, speed = 6 }) {
  const [displayed, setDisplayed] = React.useState("");
  const [done, setDone] = React.useState(false);
  React.useEffect(() => {
    setDisplayed(""); setDone(false);
    let i = 0;
    const iv = setInterval(() => { i++; setDisplayed(text.slice(0, i)); if (i >= text.length) { clearInterval(iv); setDone(true); } }, speed);
    return () => clearInterval(iv);
  }, [text, speed]);
  return <span>{displayed}{!done && <span className="animate-pulse">▌</span>}</span>;
}

async function callAI(systemPrompt, userMessage) {
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000, system: systemPrompt, messages: [{ role: "user", content: userMessage }] })
  });
  const data = await response.json();
  return data.content?.map(b => b.text || "").join("\n") || "Unable to generate response.";
}

async function callAILong(systemPrompt, userMessage) {
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 4000, system: systemPrompt, messages: [{ role: "user", content: userMessage }] })
  });
  const data = await response.json();
  return data.content?.map(b => b.text || "").join("\n") || "Unable to generate ideas.";
}

function parseIdeas(raw) {
  return raw.split("---").map(block => block.trim()).filter(b => b.length > 50).map((block, i) => {
    const sections = {};
    const patterns = [
      { key: "name", regex: /\*\*\[?([^\]*]+)\]?\*\*/m },
      { key: "tension", regex: /\*\*THE CULTURAL TENSION:?\*\*\s*([\s\S]*?)(?=\*\*THE BIG IDEA|\*\*THE EXECUTION|$)/i },
      { key: "bigIdea", regex: /\*\*THE BIG IDEA:?\*\*\s*([\s\S]*?)(?=\*\*THE EXECUTION|\*\*THE ACTIVATION|$)/i },
      { key: "execution", regex: /\*\*THE EXECUTION:?\*\*\s*([\s\S]*?)(?=\*\*THE ACTIVATION|\*\*WHY IT WORKS|$)/i },
      { key: "activation", regex: /\*\*THE ACTIVATION:?\*\*\s*([\s\S]*?)(?=\*\*WHY IT WORKS|\*\*SAMPLE|$)/i },
      { key: "why", regex: /\*\*WHY IT WORKS:?\*\*\s*([\s\S]*?)(?=\*\*SAMPLE|\*\*HEADLINE|$)/i },
      { key: "headline", regex: /\*\*(?:SAMPLE )?HEADLINE:?\*\*\s*([\s\S]*?)$/i },
    ];
    patterns.forEach(({ key, regex }) => {
      const match = block.match(regex);
      sections[key] = match ? match[1]?.trim().replace(/\*\*/g, "") : "";
    });
    if (!sections.name) sections.name = `Concept ${i + 1}`;
    return sections;
  });
}

        parsed = JSON.parse(clean);
      } catch(e) {
        parsed = { image_prompt: `A cinematic, high-end advertising key visual for a campaign called "${idea.name}". ${idea.bigIdea}. Professional photography, dramatic lighting, bold composition.`, art_direction: "Bold, cinematic, production-ready.", color_palette: ["#E85D26","#1A1A1A","#E8E4DE","#333333","#888888"], mood_keywords: ["bold","cinematic","striking","modern"], visual_description: idea.bigIdea, typography: "Bold sans-serif headlines" };
      }

      // Step 2: Generate image with Nano Banana Pro via Gemini API
      let imageUrl = null;
      try {
        const geminiRes = await fetch(
          `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-exp:generateContent?key=${geminiKey}`,
          {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              contents: [{
                parts: [{ text: parsed.image_prompt + " High-end advertising photography, cinematic composition, professional lighting, 16:9 aspect ratio, no text or words in the image." }]
              }],
              generationConfig: { responseModalities: ["TEXT", "IMAGE"] }
            })
          }
        );
        const geminiData = await geminiRes.json();
        
        // Extract image from response
        if (geminiData.candidates && geminiData.candidates[0]) {
          const parts = geminiData.candidates[0].content?.parts || [];
          for (const part of parts) {
            if (part.inlineData && part.inlineData.mimeType?.startsWith("image/")) {
              imageUrl = `data:${part.inlineData.mimeType};base64,${part.inlineData.data}`;
              break;
            }
          }
        }
      } catch (imgErr) {
        console.error("Gemini image error:", imgErr);
      }

      setKeyVisuals(prev => ({
        ...prev,
        [ideaIndex]: { ...parsed, imageUrl, headline: idea.headline || idea.name }
      }));
    } catch (e) {
      setKeyVisuals(prev => ({ ...prev, [ideaIndex]: { error: true } }));
    }
    setVisualLoading(prev => ({ ...prev, [ideaIndex]: false }));
  };

  React.useEffect(() => {
    const filled = Object.values(sections).filter(v => v.trim().length > 20).length;
    setCompletionPct(Math.round((filled / SECTIONS.length) * 100));
  }, [sections]);

  const handleAIDraft = async (sectionId) => {
    const section = SECTIONS.find(s => s.id === sectionId);
    const context = `Client: ${clientName || "Not specified"}\nProject: ${briefName || "Not specified"}\n\nExisting brief content:\n${Object.entries(sections).filter(([, v]) => v.trim()).map(([k, v]) => `${SECTIONS.find(s => s.id === k)?.title}: ${v}`).join("\n\n")}`;
    setAiLoading(prev => ({ ...prev, [sectionId]: true }));
    try {
      const result = await callAI(SECTION_AI_SYSTEM + " " + section.aiPrompt, context);
      setAiSuggestions(prev => ({ ...prev, [sectionId]: result }));
    } catch (e) { setAiSuggestions(prev => ({ ...prev, [sectionId]: "Could not generate. Try again." })); }
    setAiLoading(prev => ({ ...prev, [sectionId]: false }));
  };

  const handleRefine = async (sectionId) => {
    const section = SECTIONS.find(s => s.id === sectionId);
    if (!sections[sectionId]?.trim()) return;
    setAiLoading(prev => ({ ...prev, [sectionId]: true }));
    try {
      const result = await callAI(SECTION_AI_SYSTEM + " Refine and elevate this section. Make it sharper, more specific, more inspiring to a creative team. Keep the core intent.", `Section: ${section.title}\n\nCurrent draft:\n${sections[sectionId]}\n\nClient: ${clientName}\nProject: ${briefName}`);
      setAiSuggestions(prev => ({ ...prev, [sectionId]: result }));
    } catch (e) { setAiSuggestions(prev => ({ ...prev, [sectionId]: "Could not refine. Try again." })); }
    setAiLoading(prev => ({ ...prev, [sectionId]: false }));
  };

  const acceptSuggestion = (sectionId) => {
    setSections(prev => ({ ...prev, [sectionId]: aiSuggestions[sectionId] }));
    setAiSuggestions(prev => ({ ...prev, [sectionId]: undefined }));
  };

  const generateCreativeIdeas = async () => {
    setIdeaLoading(true); setShowIdeation(true); setParsedIdeas([]); setExpandedIdea(0); setKeyVisuals({}); setVisualLoading({});
    const fullBrief = SECTIONS.map(s => `## ${s.title}\n${sections[s.id] || "(not filled in)"}`).join("\n\n");
    try {
      const result = await callAILong(ECD_SYSTEM_PROMPT, `# CREATIVE BRIEF\nClient: ${clientName || "Not specified"}\nProject: ${briefName || "Not specified"}\n\n${fullBrief}`);
      setCreativeIdeas(result);
      setParsedIdeas(parseIdeas(result));
    } catch (e) { setCreativeIdeas("Could not generate ideas. Please try again."); }
    setIdeaLoading(false);
  };

  const currentIndex = SECTIONS.findIndex(s => s.id === activeSection);

        {/* MAIN */}
        <div style={{ flex: 1, display: "flex", flexDirection: "column", overflowY: "auto" }}>
          {!showIdeation ? (

                <textarea value={sections[activeSection]} onChange={e => setSections(prev => ({ ...prev, [activeSection]: e.target.value }))} placeholder={currentSection.placeholder} style={{ width: "100%", minHeight: 200, background: "rgba(20,20,20,.6)", border: "1px solid #1A1A1A", borderRadius: 4, padding: 22, color: "#E8E4DE", fontFamily: "'Instrument Sans',sans-serif", fontSize: 14, lineHeight: 1.8, resize: "vertical", transition: "border-color .2s" }} onFocus={e => e.target.style.borderColor = "rgba(232,93,38,.35)"} onBlur={e => e.target.style.borderColor = "#1A1A1A"} />

                <div style={{ display: "flex", gap: 10, marginTop: 14 }}>

                  <div style={{ marginTop: 18, background: "rgba(232,93,38,.03)", border: "1px solid rgba(232,93,38,.12)", borderRadius: 4, padding: 22, animation: "fadeUp .4s ease" }}>
                    <div className="section-label">AI Suggestion</div>
                    <div style={{ fontSize: 14, lineHeight: 1.85, color: "#BBB" }}><TypewriterText text={aiSuggestions[activeSection]} /></div>

                      <button className="btn-p" onClick={() => acceptSuggestion(activeSection)} style={{ fontSize: 10, padding: "8px 16px" }}>Accept</button>
                      <button className="btn-g" onClick={() => setAiSuggestions(prev => ({ ...prev, [activeSection]: undefined }))} style={{ fontSize: 10, padding: "8px 16px" }}>Dismiss</button>

                <div style={{ display: "flex", gap: 5 }}>
                  {SECTIONS.map((s, i) => (<div key={s.id} style={{ width: 22, height: 3, borderRadius: 1, background: i === currentIndex ? "#E85D26" : sections[s.id]?.trim().length > 20 ? "rgba(232,93,38,.35)" : "#1A1A1A", cursor: "pointer", transition: "all .2s" }} onClick={() => setActiveSection(s.id)} />))}

              <div style={{ maxWidth: 820 }}>

                  <div className="section-label" style={{ marginBottom: 6 }}>Creative Ideation Engine</div>
                  <h1 style={{ fontFamily: "'Playfair Display',serif", fontSize: 32, fontWeight: 900, margin: "0 0 6px", letterSpacing: -1 }}>Campaign Concepts</h1>
                  <p style={{ color: "#555", fontSize: 13, margin: 0, lineHeight: 1.6 }}>
                    for <strong style={{ color: "#CCC" }}>{clientName || "your project"}</strong> — generated by your AI ECD with the combined creative DNA of W+K, 72andSunny, Edelman, GS&P, and years of SXSW activations.
                  </p>
                </div>

                {ideaLoading && (
                  <div style={{ padding: "50px 0", textAlign: "center" }}>
                    <PulsingDots msg="Your ECD is building campaign concepts..." />

                            <div>
                              <div style={{ fontFamily: "'Playfair Display',serif", fontSize: 20, fontWeight: 700, lineHeight: 1.2 }}>{idea.name || `Concept ${i + 1}`}</div>

                )}

                {creativeIdeas && parsedIdeas.length === 0 && !ideaLoading && (
                  <div style={{ background: "rgba(232,93,38,.03)", border: "1px solid rgba(232,93,38,.12)", borderRadius: 4, padding: 24, whiteSpace: "pre-wrap", fontSize: 14, lineHeight: 1.85, color: "#BBB" }}>{creativeIdeas}</div>
                )}
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(CreativeBriefTool));
  </script>
</body>
</html>
